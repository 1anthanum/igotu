version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: igotu-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/igotu.db
      JWT_SECRET: ${JWT_SECRET:-please-change-this-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - igotu_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: igotu-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  igotu_data:
