name: Sync to Hugging Face Space

# 触发条件：
#   - push 到 main：自动同步
#   - 手动触发：在 GitHub Actions 页面点 Run workflow（用于强制重推或测试）
on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止并发：如果上一次还在跑，新的把它取消
concurrency:
  group: hf-sync
  cancel-in-progress: false  # 不取消，保证每次 push 都同步成功

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (full history + LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须 full history，HF 非 fast-forward push 会被拒
          lfs: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: xuyangchen
          HF_SPACE: igotu
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Missing HF_TOKEN secret. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          # Add HF as a remote with token-embedded URL (token is masked in logs by Actions)
          git remote add hf "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}.git"

          # Push current main; force only on workflow_dispatch (manual)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git push hf HEAD:main --force
          else
            git push hf HEAD:main
          fi
          echo "✓ Synced to https://huggingface.co/spaces/${HF_USER}/${HF_SPACE}"
